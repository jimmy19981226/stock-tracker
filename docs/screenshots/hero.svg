<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="gradBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6384ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#07090d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2330"/>
      <stop offset="100%" stop-color="#11161f"/>
    </linearGradient>
    <radialGradient id="heroGlow1" cx="100%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroGlow2" cx="0%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#6384ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6384ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="gradD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="760" fill="#07090d"/>
  <rect width="1200" height="400" fill="url(#bgGlow)"/>

  <!-- Header -->
  <g transform="translate(40, 36)">
    <rect width="32" height="32" rx="9" fill="url(#gradBrand)"/>
    <path d="M8 24 L14 18 L18 22 L26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="26" cy="12" r="1.6" fill="white"/>
    <text x="46" y="22" font-size="20" font-weight="800" fill="url(#gradBrand)" letter-spacing="-0.02em">AI Stock Tracker</text>

    <!-- Status pills next to brand -->
    <g transform="translate(260, 4)" font-size="11" font-weight="700" letter-spacing="0.08em">
      <!-- TW OPEN pill -->
      <rect width="98" height="24" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)"/>
      <circle cx="11" cy="12" r="3.5" fill="#34d399"/>
      <text x="22" y="16" fill="#34d399">TW OPEN</text>

      <!-- LIVE pill -->
      <g transform="translate(108, 0)">
        <rect width="62" height="24" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)"/>
        <circle cx="11" cy="12" r="3.5" fill="#34d399"/>
        <text x="22" y="16" fill="#34d399">LIVE</text>
      </g>
    </g>

    <!-- Nav pills -->
    <g transform="translate(700, 0)" font-size="13" font-weight="500">
      <rect width="100" height="32" rx="9" fill="#161c27" stroke="rgba(255,255,255,0.1)"/>
      <text x="50" y="21" text-anchor="middle" fill="#e8ecf2">Dashboard</text>
      <text x="130" y="21" fill="#a8b3c7">Trades</text>
      <text x="195" y="21" fill="#a8b3c7">Dividends</text>
      <text x="275" y="21" fill="#a8b3c7">Data</text>
      <rect x="335" y="0" width="40" height="32" rx="9" fill="#161c27" stroke="rgba(255,255,255,0.1)"/>
      <text x="355" y="21" text-anchor="middle" fill="#a8b3c7" font-size="14">↻</text>
    </g>
  </g>
  <line x1="40" y1="84" x2="1160" y2="84" stroke="rgba(255,255,255,0.06)"/>

  <!-- Panel: TWD Portfolio -->
  <g transform="translate(40, 108)">
    <rect width="1120" height="232" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="28" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">TWD PORTFOLIO · 2 HOLDINGS</text>

    <!-- Hero card -->
    <g transform="translate(22, 46)">
      <rect width="640" height="166" rx="12" fill="url(#gradHero)" stroke="rgba(99,132,255,0.25)"/>
      <rect width="640" height="166" rx="12" fill="url(#heroGlow1)"/>
      <rect width="640" height="166" rx="12" fill="url(#heroGlow2)"/>
      <text x="22" y="32" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="0.1em">TOTAL EARNED</text>
      <text x="22" y="92" font-size="46" font-weight="700" fill="url(#gradBrand)" letter-spacing="-0.02em">NT$301,206.54</text>
      <text x="22" y="124" font-size="12" fill="#a8b3c7">Realized NT$189,728.00 · Dividends NT$111,478.54</text>
    </g>

    <!-- Right grid: 2x2 of small cards -->
    <g transform="translate(686, 46)">
      <!-- Market Value -->
      <g>
        <rect width="207" height="78" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="18" y="22" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">MARKET VALUE</text>
        <text x="18" y="52" font-size="22" font-weight="700" fill="#e8ecf2" letter-spacing="-0.02em">NT$232,500</text>
        <text x="18" y="68" font-size="11" fill="#6b7589">Cost: 90,050</text>
      </g>
      <g transform="translate(217, 0)">
        <rect width="207" height="78" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="18" y="22" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">UNREALIZED P/L</text>
        <text x="18" y="52" font-size="22" font-weight="700" fill="#34d399" letter-spacing="-0.02em">+NT$142,450</text>
        <text x="18" y="68" font-size="11" fill="#34d399">+158.19%</text>
      </g>
      <g transform="translate(0, 88)">
        <rect width="207" height="78" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="18" y="22" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">TODAY</text>
        <text x="18" y="52" font-size="22" font-weight="700" fill="#34d399" letter-spacing="-0.02em">+NT$7,500</text>
        <text x="18" y="68" font-size="11" fill="#34d399">+3.33%</text>
      </g>
      <g transform="translate(217, 88)">
        <rect width="207" height="78" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="18" y="22" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">REALIZED P/L</text>
        <text x="18" y="52" font-size="22" font-weight="700" fill="#e8ecf2" letter-spacing="-0.02em">NT$189,728</text>
        <text x="18" y="68" font-size="11" fill="#6b7589">From closed positions</text>
      </g>
    </g>
  </g>

  <!-- Chart panel -->
  <g transform="translate(40, 360)">
    <rect width="1120" height="376" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <!-- Title row -->
    <text x="22" y="28" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">CUMULATIVE EARNINGS</text>
    <text x="22" y="52" font-size="12" fill="#a8b3c7">Stack height = total earned</text>

    <!-- Latest stats on right -->
    <g transform="translate(720, 28)" font-size="11" font-weight="700" letter-spacing="0.1em">
      <g>
        <rect x="0" y="-2" width="8" height="8" rx="2" fill="#6384ff"/>
        <text x="14" y="6" fill="#6b7589">REALIZED</text>
        <text x="14" y="26" font-size="16" fill="#e8ecf2" font-weight="700" letter-spacing="-0.01em">NT$189,728</text>
      </g>
      <g transform="translate(120, 0)">
        <rect x="0" y="-2" width="8" height="8" rx="2" fill="#fbbf24"/>
        <text x="14" y="6" fill="#6b7589">DIVIDENDS</text>
        <text x="14" y="26" font-size="16" fill="#e8ecf2" font-weight="700" letter-spacing="-0.01em">NT$111,478</text>
      </g>
      <g transform="translate(248, 0)">
        <rect x="0" y="-2" width="8" height="8" rx="2" fill="#a78bfa"/>
        <text x="14" y="6" fill="#a78bfa">TOTAL</text>
        <text x="14" y="28" font-size="20" fill="#a78bfa" font-weight="700" letter-spacing="-0.02em">NT$301,206</text>
      </g>
    </g>

    <!-- Chart area -->
    <g transform="translate(60, 100)">
      <!-- gridlines -->
      <line x1="0" y1="0"   x2="1040" y2="0"   stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="60"  x2="1040" y2="60"  stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="120" x2="1040" y2="120" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="180" x2="1040" y2="180" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="240" x2="1040" y2="240" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>

      <!-- y axis labels -->
      <g font-size="11" fill="#6b7589" text-anchor="end">
        <text x="-10" y="4">300k</text>
        <text x="-10" y="64">240k</text>
        <text x="-10" y="124">180k</text>
        <text x="-10" y="184">120k</text>
        <text x="-10" y="244">60k</text>
        <text x="-10" y="244" dy="60">0</text>
      </g>

      <!-- Stacked areas: bottom = realized, top = dividends.
           Series1 = realized only (rises with sells).
           Series2 = realized + dividends total (rises with both). -->
      <!-- Realized area (blue): from y=baseline up to realized line -->
      <path d="M 0 240 L 60 240 L 130 240 L 200 230 L 320 215 L 420 215 L 520 195 L 600 175 L 720 95 L 820 80 L 940 70 L 1040 55 L 1040 240 Z"
            fill="url(#gradR)"/>
      <!-- Dividends area (amber): from realized line up to total line -->
      <path d="M 0 240 L 60 235 L 130 230 L 200 220 L 320 200 L 420 195 L 520 165 L 600 140 L 720 50 L 820 30 L 940 15 L 1040 -5
               L 1040 55 L 940 70 L 820 80 L 720 95 L 600 175 L 520 195 L 420 215 L 320 215 L 200 230 L 130 240 L 60 240 L 0 240 Z"
            fill="url(#gradD)"/>
      <!-- Realized line -->
      <path d="M 0 240 L 60 240 L 130 240 L 200 230 L 320 215 L 420 215 L 520 195 L 600 175 L 720 95 L 820 80 L 940 70 L 1040 55"
            stroke="#6384ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Total line (top of stack) -->
      <path d="M 0 240 L 60 235 L 130 230 L 200 220 L 320 200 L 420 195 L 520 165 L 600 140 L 720 50 L 820 30 L 940 15 L 1040 -5"
            stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- x-axis labels -->
      <g font-size="11" fill="#6b7589" text-anchor="middle">
        <text x="0"    y="260">2023</text>
        <text x="260"  y="260">2024</text>
        <text x="520"  y="260">2025</text>
        <text x="780"  y="260">2026</text>
      </g>
    </g>
  </g>
</svg>
