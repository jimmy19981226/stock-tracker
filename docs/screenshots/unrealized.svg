<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07090d"/>
      <stop offset="100%" stop-color="#0a0e15"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g transform="translate(40, 32)">
    <rect width="1120" height="636" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="30" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">UNREALIZED P/L BY POSITION</text>
    <text x="22" y="50" font-size="12" fill="#a8b3c7">Live paper gain or loss on each open holding at current market prices.</text>

    <!-- Header strip -->
    <text x="22" y="84" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">TWD</text>
    <g transform="translate(680, 64)" font-size="10" font-weight="700" letter-spacing="0.1em">
      <g>
        <rect x="0" y="0" width="8" height="8" rx="2" fill="#34d399"/>
        <text x="14" y="8" fill="#6b7589">TOTAL</text>
        <text x="14" y="28" font-size="20" fill="#34d399" font-weight="700" letter-spacing="-0.01em">+NT$261,966</text>
      </g>
      <g transform="translate(170, 0)">
        <rect x="0" y="0" width="8" height="8" rx="2" fill="#34d399"/>
        <text x="14" y="8" fill="#6b7589">WINNERS</text>
        <text x="14" y="28" font-size="16" fill="#e8ecf2" font-weight="700">12</text>
      </g>
      <g transform="translate(280, 0)">
        <rect x="0" y="0" width="8" height="8" rx="2" fill="#f87171"/>
        <text x="14" y="8" fill="#6b7589">LOSERS</text>
        <text x="14" y="28" font-size="16" fill="#e8ecf2" font-weight="700">6</text>
      </g>
    </g>

    <!-- Bar chart -->
    <g transform="translate(96, 116)">
      <!-- Center reference line at x=440 (the 0 line) -->
      <line x1="440" y1="0" x2="440" y2="500" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

      <!-- y-axis ticker labels + bars (each row is 28px tall) -->
      <!-- Format: ticker(left), bar(extending from 440) -->

      <g font-size="12" font-weight="600" fill="#a8b3c7" font-variant-numeric="tabular-nums">
        <!-- 2330 +262k - dominant green bar -->
        <text x="-10" y="20" text-anchor="end">2330</text>
        <rect x="440" y="10" width="510" height="20" rx="3" fill="#34d399"/>

        <!-- 2379 +18k -->
        <text x="-10" y="48" text-anchor="end">2379</text>
        <rect x="440" y="38" width="36" height="20" rx="3" fill="#34d399"/>

        <!-- 2382 +7.5k -->
        <text x="-10" y="76" text-anchor="end">2382</text>
        <rect x="440" y="66" width="15" height="20" rx="3" fill="#34d399"/>

        <!-- 6139 +7.5k -->
        <text x="-10" y="104" text-anchor="end">6139</text>
        <rect x="440" y="94" width="15" height="20" rx="3" fill="#34d399"/>

        <!-- 3515 +6.3k -->
        <text x="-10" y="132" text-anchor="end">3515</text>
        <rect x="440" y="122" width="13" height="20" rx="3" fill="#34d399"/>

        <!-- 2385 +5.8k -->
        <text x="-10" y="160" text-anchor="end">2385</text>
        <rect x="440" y="150" width="12" height="20" rx="3" fill="#34d399"/>

        <!-- 3592 +4.6k -->
        <text x="-10" y="188" text-anchor="end">3592</text>
        <rect x="440" y="178" width="9" height="20" rx="3" fill="#34d399"/>

        <!-- 3231 +2.9k -->
        <text x="-10" y="216" text-anchor="end">3231</text>
        <rect x="440" y="206" width="6" height="20" rx="3" fill="#34d399"/>

        <!-- 6206 +2.6k -->
        <text x="-10" y="244" text-anchor="end">6206</text>
        <rect x="440" y="234" width="5" height="20" rx="3" fill="#34d399"/>

        <!-- 2377 +2.3k -->
        <text x="-10" y="272" text-anchor="end">2377</text>
        <rect x="440" y="262" width="5" height="20" rx="3" fill="#34d399"/>

        <!-- 8081 +2.2k -->
        <text x="-10" y="300" text-anchor="end">8081</text>
        <rect x="440" y="290" width="4" height="20" rx="3" fill="#34d399"/>

        <!-- 3014 +1.6k -->
        <text x="-10" y="328" text-anchor="end">3014</text>
        <rect x="440" y="318" width="3" height="20" rx="3" fill="#34d399"/>

        <!-- 2211 -1.6k -->
        <text x="-10" y="356" text-anchor="end">2211</text>
        <rect x="437" y="346" width="3" height="20" rx="3" fill="#f87171"/>

        <!-- 3005 -2.5k -->
        <text x="-10" y="384" text-anchor="end">3005</text>
        <rect x="435" y="374" width="5" height="20" rx="3" fill="#f87171"/>

        <!-- 6596 -6.2k -->
        <text x="-10" y="412" text-anchor="end">6596</text>
        <rect x="428" y="402" width="12" height="20" rx="3" fill="#f87171"/>

        <!-- 3596 -6.6k -->
        <text x="-10" y="440" text-anchor="end">3596</text>
        <rect x="427" y="430" width="13" height="20" rx="3" fill="#f87171"/>

        <!-- 3010 -13.2k -->
        <text x="-10" y="468" text-anchor="end">3010</text>
        <rect x="414" y="458" width="26" height="20" rx="3" fill="#f87171"/>

        <!-- 3029 -31.3k -->
        <text x="-10" y="496" text-anchor="end">3029</text>
        <rect x="378" y="486" width="62" height="20" rx="3" fill="#f87171"/>
      </g>

      <!-- x-axis ticks -->
      <g font-size="11" fill="#6b7589" text-anchor="middle">
        <text x="0" y="525">−50k</text>
        <text x="220" y="525">−25k</text>
        <text x="440" y="525">0</text>
        <text x="660" y="525">100k</text>
        <text x="880" y="525">200k</text>
        <text x="1000" y="525">250k</text>
      </g>
    </g>
  </g>
</svg>
