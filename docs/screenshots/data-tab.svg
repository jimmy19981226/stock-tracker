<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07090d"/>
      <stop offset="100%" stop-color="#0a0e15"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7194ff"/>
      <stop offset="100%" stop-color="#5878f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="460" fill="url(#bg)"/>

  <g transform="translate(40, 32)">
    <rect width="1120" height="396" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="30" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">IMPORT / EXPORT</text>

    <!-- Buttons -->
    <g transform="translate(22, 50)">
      <rect width="200" height="36" rx="9" fill="url(#primaryBtn)"/>
      <text x="100" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="white">⤓  Export portfolio.csv</text>

      <g transform="translate(212, 0)">
        <rect width="200" height="36" rx="9" fill="#1c2330" stroke="rgba(255,255,255,0.1)"/>
        <text x="100" y="23" text-anchor="middle" font-size="13" font-weight="600" fill="#e8ecf2">⤒  Import portfolio.csv</text>
      </g>

      <text x="430" y="23" font-size="12" fill="#34d399">✓ Imported 50 trades + 49 dividends</text>
    </g>

    <!-- Three summary cards -->
    <g transform="translate(22, 110)">
      <g>
        <rect width="350" height="92" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="24" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">TRADES ON FILE</text>
        <text x="20" y="58" font-size="32" font-weight="700" fill="#e8ecf2" letter-spacing="-0.02em">50</text>
        <text x="20" y="78" font-size="11" fill="#6b7589">Latest: 2026-04-28 · SELL 3034</text>
      </g>

      <g transform="translate(360, 0)">
        <rect width="350" height="92" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="24" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">DIVIDENDS ON FILE</text>
        <text x="20" y="58" font-size="32" font-weight="700" fill="#e8ecf2" letter-spacing="-0.02em">49</text>
        <text x="20" y="78" font-size="11" fill="#6b7589">Latest: 2026-03-26 · 6596</text>
      </g>

      <g transform="translate(720, 0)">
        <rect width="356" height="92" rx="12" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
        <text x="20" y="24" font-size="10" font-weight="700" fill="#6b7589" letter-spacing="0.1em">LAST EXPORT</text>
        <text x="20" y="58" font-size="22" font-weight="700" fill="#e8ecf2" letter-spacing="-0.02em">3 minutes ago</text>
        <text x="20" y="78" font-size="11" fill="#6b7589">2026-05-07 22:48 local time</text>
      </g>
    </g>

    <!-- CSV format heading -->
    <text x="22" y="240" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">CSV FORMAT</text>

    <!-- Code block -->
    <g transform="translate(22, 254)">
      <rect width="1076" height="116" rx="10" fill="#161c27" stroke="rgba(255,255,255,0.06)"/>
      <g font-family="ui-monospace, 'SF Mono', monospace" font-size="12">
        <text x="14" y="22" fill="#a78bfa">kind</text><text x="44" y="22" fill="#6b7589">,</text><text x="50" y="22" fill="#a78bfa">type</text><text x="80" y="22" fill="#6b7589">,</text><text x="86" y="22" fill="#a78bfa">ticker</text><text x="128" y="22" fill="#6b7589">,</text><text x="134" y="22" fill="#a78bfa">shares</text><text x="178" y="22" fill="#6b7589">,</text><text x="184" y="22" fill="#a78bfa">price</text><text x="220" y="22" fill="#6b7589">,</text><text x="226" y="22" fill="#a78bfa">date</text><text x="256" y="22" fill="#6b7589">,</text><text x="262" y="22" fill="#a78bfa">fee</text><text x="284" y="22" fill="#6b7589">,</text><text x="290" y="22" fill="#a78bfa">amount</text><text x="334" y="22" fill="#6b7589">,</text><text x="340" y="22" fill="#a78bfa">notes</text>
        <text x="14" y="46" fill="#34d399">trade</text><text x="50" y="46" fill="#6b7589">,</text><text x="56" y="46" fill="#34d399">buy</text><text x="80" y="46" fill="#6b7589">,</text><text x="86" y="46" fill="#fbbf24">2330</text><text x="116" y="46" fill="#6b7589">,</text><text x="122" y="46" fill="#e8ecf2">100</text><text x="146" y="46" fill="#6b7589">,</text><text x="152" y="46" fill="#e8ecf2">950</text><text x="176" y="46" fill="#6b7589">,</text><text x="182" y="46" fill="#e8ecf2">2024-01-15</text><text x="252" y="46" fill="#6b7589">,</text><text x="258" y="46" fill="#e8ecf2">28</text><text x="274" y="46" fill="#6b7589">,,</text><text x="288" y="46" fill="#a8b3c7">initial buy</text>
        <text x="14" y="68" fill="#34d399">trade</text><text x="50" y="68" fill="#6b7589">,</text><text x="56" y="68" fill="#f87171">sell</text><text x="84" y="68" fill="#6b7589">,</text><text x="90" y="68" fill="#fbbf24">2330</text><text x="120" y="68" fill="#6b7589">,</text><text x="126" y="68" fill="#e8ecf2">100</text><text x="150" y="68" fill="#6b7589">,</text><text x="156" y="68" fill="#e8ecf2">1100</text><text x="186" y="68" fill="#6b7589">,</text><text x="192" y="68" fill="#e8ecf2">2024-06-01</text><text x="262" y="68" fill="#6b7589">,</text><text x="268" y="68" fill="#e8ecf2">30</text><text x="284" y="68" fill="#6b7589">,,</text><text x="298" y="68" fill="#a8b3c7">closed</text>
        <text x="14" y="90" fill="#34d399">dividend</text><text x="68" y="90" fill="#6b7589">,,</text><text x="80" y="90" fill="#fbbf24">2330</text><text x="110" y="90" fill="#6b7589">,,,</text><text x="128" y="90" fill="#e8ecf2">2024-08-15</text><text x="198" y="90" fill="#6b7589">,,</text><text x="210" y="90" fill="#e8ecf2">5</text><text x="220" y="90" fill="#6b7589">,</text><text x="226" y="90" fill="#a8b3c7">Q2 cash dividend</text>
      </g>
    </g>
  </g>
