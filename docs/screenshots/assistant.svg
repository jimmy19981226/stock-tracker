<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="gradBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6384ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#07090d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sidebarBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#131825"/>
      <stop offset="100%" stop-color="#0f131c"/>
    </linearGradient>
    <linearGradient id="activeRow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="bubbleUser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6384ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6384ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="-20" dy="0" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="760" fill="#07090d"/>
  <rect width="1200" height="400" fill="url(#bgGlow)"/>

  <!-- Header (dimmed, behind sidebar) -->
  <g transform="translate(40, 36)" opacity="0.55">
    <rect width="32" height="32" rx="9" fill="url(#gradBrand)"/>
    <path d="M8 24 L14 18 L18 22 L26 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="26" cy="12" r="1.6" fill="white"/>
    <text x="46" y="22" font-size="20" font-weight="800" fill="url(#gradBrand)" letter-spacing="-0.02em">AI Stock Tracker</text>

    <g transform="translate(260, 4)" font-size="11" font-weight="700" letter-spacing="0.08em">
      <rect width="98" height="24" rx="8" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)"/>
      <circle cx="11" cy="12" r="3.5" fill="#34d399"/>
      <text x="22" y="16" fill="#34d399">TW OPEN</text>
    </g>
  </g>

  <!-- Dashboard panel (faded, behind sidebar) -->
  <g transform="translate(40, 108)" opacity="0.45">
    <rect width="700" height="232" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="28" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">TWD PORTFOLIO · 2 HOLDINGS</text>
    <g transform="translate(22, 46)">
      <rect width="656" height="166" rx="12" fill="#1c2330" stroke="rgba(99,132,255,0.25)"/>
      <text x="22" y="32" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="0.1em">TOTAL EARNED</text>
      <text x="22" y="92" font-size="46" font-weight="700" fill="url(#gradBrand)" letter-spacing="-0.02em">NT$301,206.54</text>
      <text x="22" y="124" font-size="12" fill="#a8b3c7">Realized NT$189,728 · Dividends NT$111,478</text>
    </g>
  </g>

  <g transform="translate(40, 360)" opacity="0.32">
    <rect width="700" height="376" rx="16" fill="#11161f" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="28" font-size="11" font-weight="700" fill="#6b7589" letter-spacing="0.1em">CUMULATIVE EARNINGS</text>
    <g transform="translate(40, 80)">
      <line x1="0" y1="0"   x2="620" y2="0"   stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="60"  x2="620" y2="60"  stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="120" x2="620" y2="120" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="180" x2="620" y2="180" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <line x1="0" y1="240" x2="620" y2="240" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2 6"/>
      <path d="M 0 240 L 80 235 L 160 220 L 240 200 L 320 165 L 400 140 L 480 95 L 560 50 L 620 30"
            stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M 0 240 L 80 240 L 160 240 L 240 230 L 320 215 L 400 195 L 480 175 L 560 95 L 620 75"
            stroke="#6384ff" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Sidebar -->
  <g transform="translate(770, 0)" filter="url(#softShadow)">
    <rect width="430" height="760" fill="url(#sidebarBg)"/>
    <line x1="0" y1="0" x2="0" y2="760" stroke="rgba(99,132,255,0.08)" stroke-width="1"/>
  </g>

  <!-- Sidebar header -->
  <g transform="translate(770, 0)">
    <rect width="430" height="60" fill="rgba(255,255,255,0.018)"/>
    <line x1="0" y1="60" x2="430" y2="60" stroke="rgba(255,255,255,0.06)"/>

    <!-- Left: ☰ menu button + ✦ Chats title -->
    <g transform="translate(16, 14)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" text-anchor="middle" font-size="14" fill="#a8b3c7">☰</text>
    </g>
    <g transform="translate(60, 14)">
      <rect width="22" height="22" rx="7" fill="url(#gradBrand)"/>
      <text x="11" y="16" text-anchor="middle" font-size="12" fill="white">✦</text>
      <text x="32" y="17" font-size="14" font-weight="700" fill="#e8ecf2" letter-spacing="-0.01em">Chats</text>
    </g>

    <!-- Right: + and ✕ -->
    <g transform="translate(338, 14)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" text-anchor="middle" font-size="16" fill="#a8b3c7">+</text>
    </g>
    <g transform="translate(380, 14)">
      <rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <text x="16" y="22" text-anchor="middle" font-size="13" fill="#a8b3c7">✕</text>
    </g>
  </g>

  <!-- Chat list rows -->
  <g transform="translate(778, 80)" font-size="13">
    <!-- Row 1 (active) -->
    <g>
      <rect width="414" height="58" rx="8" fill="url(#activeRow)" stroke="rgba(99,132,255,0.32)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Top 3 winners by % return?</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">6 msg · just now</text>
      <!-- actions -->
      <g transform="translate(330, 16)">
        <rect width="32" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
        <text x="16" y="19" text-anchor="middle" font-size="12" fill="#a8b3c7">✏</text>
      </g>
      <g transform="translate(370, 16)">
        <rect width="32" height="26" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
        <text x="16" y="19" text-anchor="middle" font-size="11" fill="#a8b3c7">🗑</text>
      </g>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 66)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Best dividend month in 2025?</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">4 msg · 12m ago</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 132)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Compare realized P/L vs dividends</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">8 msg · 1h ago</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(0, 198)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Which positions are losing money?</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">3 msg · 3h ago</text>
    </g>

    <!-- Row 5 -->
    <g transform="translate(0, 264)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Summarize my 2024 performance</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">12 msg · 2d ago</text>
    </g>

    <!-- Row 6 -->
    <g transform="translate(0, 330)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">2330 cost basis breakdown</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">5 msg · 5d ago</text>
    </g>

    <!-- Row 7 -->
    <g transform="translate(0, 396)">
      <rect width="414" height="58" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.04)"/>
      <text x="14" y="22" font-size="13" font-weight="500" fill="#e8ecf2">Total fees paid this year</text>
      <text x="14" y="42" font-size="10.5" fill="#a8b3c7" letter-spacing="0.01em">2 msg · Apr 22</text>
    </g>
  </g>

  <!-- Hint label below sidebar -->
  <g transform="translate(40, 720)">
    <rect width="700" height="28" rx="6" fill="rgba(99,132,255,0.06)" stroke="rgba(99,132,255,0.18)"/>
    <text x="14" y="18" font-size="11" font-weight="500" fill="#a8b3c7" letter-spacing="0.01em">
      ✦ Persistent chat history — every conversation is saved to SQLite. Click ✏ to rename, 🗑 to delete, + to start fresh.
    </text>
  </g>
</svg>
