name: StockTracker
options:
  bundleIdPrefix: com.aistockstudio
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    # Automatic signing with the team that already has a profile for this app.
    # (The unsigned .ipa for SideStore is built via rebuild-ipa.sh, which forces
    # CODE_SIGNING_ALLOWED=NO on the command line.)
    DEVELOPMENT_TEAM: D77DF52MVG
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  StockTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StockTracker
      - path: StockTrackerShared
    dependencies:
      # Embeds the widget extension into the app bundle (PlugIns/).
      - target: StockTrackerWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aistockstudio.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: StockTracker/StockTracker.entitlements
    info:
      path: StockTracker/Info.plist
      properties:
        CFBundleDisplayName: Stock Studio
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        NSAppTransportSecurity:
          # This is a personal, self-hosted app talking to your own backend over
          # HTTP (localhost in the simulator, a Tailscale/LAN IP on a device).
          # Arbitrary loads keeps that simple. Tighten to NSExceptionDomains, or
          # serve the backend over HTTPS (e.g. `tailscale serve`), to remove it.
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true

  StockTrackerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StockTrackerWidget
      - path: StockTrackerShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aistockstudio.app.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: StockTrackerWidget/StockTrackerWidget.entitlements
    info:
      path: StockTrackerWidget/Info.plist
      properties:
        CFBundleDisplayName: Portfolio
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
